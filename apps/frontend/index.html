<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF8F5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      var mode = localStorage.getItem('tg-theme-mode') || 'system';
      var theme = mode;
      if (mode === 'system') {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
      var tc = theme === 'dark' ? '#1C1A17' : theme === 'totoro' ? '#F0EDE4' : '#FAF8F5';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', tc);
      if (theme === 'totoro') {
        var s = document.documentElement.style;
        s.setProperty('--color-primary', '#4A7C59');
        s.setProperty('--color-primary-light', '#6B9E76');
        s.setProperty('--color-primary-dark', '#3A6247');
        s.setProperty('--color-primary-ghost', 'rgba(74, 124, 89, 0.12)');
      } else try {
        var accent = JSON.parse(localStorage.getItem('tg-theme-accent'));
        if (accent && accent.value) {
          var s = document.documentElement.style;
          s.setProperty('--color-primary', accent.value);
          s.setProperty('--color-primary-light', accent.light);
          s.setProperty('--color-primary-dark', accent.dark);
          var r = parseInt(accent.value.slice(1,3),16);
          var g = parseInt(accent.value.slice(3,5),16);
          var b = parseInt(accent.value.slice(5,7),16);
          var a = theme === 'dark' ? 0.2 : 0.1;
          s.setProperty('--color-primary-ghost', 'rgba('+r+','+g+','+b+','+a+')');
        }
      } catch(e) {}
    })();
  </script>
  <title>Time Gestion</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
